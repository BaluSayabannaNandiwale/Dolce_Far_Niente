{% extends 'professor_dashboard.html' %}
{% block body %}

<div class="row justify-content-center" style="margin-top: 10px;">
    <div class="col-12 col-md-10 col-lg-6">
        <div class="card border-0 shadow-lg mb-4">
            <div class="card-header bg-dark text-white p-4 text-center rounded-top" style="background: linear-gradient(45deg, #1c2540 0%, #31316a 100%);">
                <h2 class="h3 mb-1"><i class="fas fa-key mr-2"></i> Security Settings</h2>
                <p class="mb-0 opacity-80">Update your account credentials to maintain security</p>
            </div>
            
            <div class="card-body p-4 p-lg-5">
                <div class="text-center mb-4">
                    <img src="static/authentication_cp.png" alt="Reset Password" class="img-fluid animate-fade-in" style="max-height: 150px;">
                </div>

                <form action="{% url 'change_password_professor' %}" method="POST" id="changePasswordForm">
                    {% csrf_token %}
                    
                    <div class="form-group mb-4">
                        <label class="h6 font-weight-bold mb-3 d-flex align-items-center" for="oldpassword">
                            <i class="fas fa-lock text-muted mr-2"></i> Current Password
                        </label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-white border-right-0" style="border-radius: 12px 0 0 12px;">
                                    <i class="fas fa-shield-alt text-primary"></i>
                                </span>
                            </div>
                            <input name="oldpassword" id="oldpassword" type="password" class="form-control border-left-0 shadow-sm" 
                                placeholder="Enter current password" required style="border-radius: 0 12px 12px 0; height: 50px;">
                        </div>
                    </div>

                    <div class="form-group mb-4">
                        <label class="h6 font-weight-bold mb-3 d-flex align-items-center" for="newpassword">
                            <i class="fas fa-plus-circle text-muted mr-2"></i> New Secure Password
                        </label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text bg-white border-right-0" style="border-radius: 12px 0 0 12px;">
                                    <i class="fas fa-key text-success"></i>
                                </span>
                            </div>
                            <input name="newpassword" id="newpassword" type="password" class="form-control border-left-0 shadow-sm" 
                                placeholder="Min. 8 characters with symbols" required style="border-radius: 0 12px 12px 0; height: 50px;">
                        </div>
                    </div>

                    <div class="mt-5">
                        <button type="submit" class="btn btn-block btn-primary py-3 font-weight-bold shadow-soft" 
                            style="border-radius: 12px; font-size: 1.1rem; background: #31316a; border: none;">
                            <i class="fas fa-sync-alt mr-2"></i> UPDATE CREDENTIALS
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="card-footer bg-light border-0 py-3 text-center">
                <p class="small text-muted mb-0"><i class="fas fa-shield-check mr-1 text-success"></i> Highly secure, encrypted password storage</p>
            </div>
        </div>
    </div>
</div>

<style>
    .opacity-80 { opacity: 0.8; }
    .animate-fade-in {
        animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .form-control:focus {
        border-color: #31316a;
        box-shadow: 0 0 0 0.2rem rgba(49, 49, 106, 0.05);
    }
    .btn-primary:hover {
        background: #1c2540 !important;
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(49, 49, 106, 0.2) !important;
    }
</style>

{% endblock %}

{% extends 'professor_dashboard.html' %}
{% block body %}

<style>
    /* Card Style */
    .card {
        border-radius: 14px;
        background: linear-gradient(145deg, #ffffff, #eef7ff);
        transition: all 0.4s ease;
    }

    /* Card Hover */
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 123, 255, 0.18);
    }

    /* Heading Style */
    h3 {
        color: #2c7be5;
        font-weight: 700;
        letter-spacing: 1px;
        animation: fadeSlide 1s ease;
    }

    /* Select Box */
    .custom-select {
        border-radius: 10px;
        border: 1px solid #d6e8ff;
        transition: all 0.35s ease;
    }

    /* Hover Effect */
    .custom-select:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0, 123, 255, 0.15);
    }

    /* Focus Effect */
    .custom-select:focus {
        border-color: #4da3ff;
        box-shadow: 0 0 12px rgba(77, 163, 255, 0.4);
    }

    /* Button Style */
    .btn-primary {
        background: linear-gradient(135deg, #4da3ff, #1e90ff);
        border: none;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    /* Button Hover */
    .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0, 123, 255, 0.35);
    }

    /* Page Animation */
    @keyframes fadeSlide {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Smooth Load Animation */
    .row {
        animation: fadeInPage 0.8s ease;
    }

    @keyframes fadeInPage {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>


<div class="row align-items-center d-flex justify-content-center">
    <div class="col-12 mb-4">

        <div class="card border-light shadow-sm components-section align-items-center d-flex justify-content-center">

            <div class="card-body align-items-center d-flex justify-content-center">

                <div class="row mb-4">

                    {% if cresults %}

                    <div class="col-lg-12 col-sm-16">
                        <h3 class="h3 text-center">VIEW STUDENT LOGS</h3>
                    </div>

                    <center>
                        <lottie-player src="https://assets3.lottiefiles.com/packages/lf20_45rapv.json"
                            background="transparent" speed="1" style="width:250px;height:250px;" loop autoplay>
                        </lottie-player>
                    </center>

                    <div class="card-body">

                        <form action="displaystudentsdetails" method="POST" class="mt-4">
                            {% csrf_token %}

                            <div class="form-group text-center">

                                <div class="form-group">

                                    <label class="my-1 mr-2" for="livebox">
                                        Choose Exam ID:
                                    </label>

                                    <select class="custom-select my-1 mr-sm-2" id="livebox" name="choosetid" required>

                                        {% for test in cresults %}
                                        <option value="{{ test.test_id }}">
                                            {{ test.test_id }}
                                        </option>
                                        {% endfor %}

                                    </select>

                                </div>

                                <input type="submit" class="btn btn-block btn-primary" value="VIEW STUDENT LOGS" />

                        </form>

                    </div>

                </div>

                {% else %}

                <div class="col-lg-12 col-sm-16">

                    <center>

                        <lottie-player src="https://assets7.lottiefiles.com/datafiles/vhvOcuUkH41HdrL/data.json"
                            background="transparent" speed="1" style="width:300px;height:300px;" loop autoplay>
                        </lottie-player>

                    </center>

                    <h3 class="h3 text-center">
                        No Records Found!
                    </h3>

                </div>

                {% endif %}

            </div>

        </div>

    </div>
</div>

{% endblock %}

{% extends 'professor_dashboard.html' %}
{% load static %}
{% block body %}

<style>
    /* Card Style */
    .card {
        border-radius: 14px;
        background: linear-gradient(145deg, #ffffff, #eef7ff);
        transition: all 0.4s ease;
    }

    /* Card Hover */
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0, 123, 255, 0.18);
    }

    /* Heading */
    h3 {
        color: #2c7be5;
        font-weight: 700;
        animation: fadeSlide 1s ease;
    }

    /* Image Style (small and centered) */
    .report-img {
        width: 200px;
        height: auto;
        display: block;
        margin: 10px auto 20px auto;
        animation: floatImage 3s ease-in-out infinite;
    }

    /* Inputs */
    .form-control,
    .custom-select {
        border-radius: 10px;
        border: 1px solid #d6e8ff;
        transition: all 0.35s ease;
    }

    /* Hover */
    .form-control:hover,
    .custom-select:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 10px rgba(0, 123, 255, 0.15);
    }

    /* Focus */
    .form-control:focus,
    .custom-select:focus {
        border-color: #4da3ff;
        box-shadow: 0 0 12px rgba(77, 163, 255, 0.4);
    }

    /* Button */
    .btn-primary {
        background: linear-gradient(135deg, #4da3ff, #1e90ff);
        border: none;
        border-radius: 10px;
        padding: 10px 25px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 20px rgba(0, 123, 255, 0.35);
    }

    /* Animations */
    @keyframes fadeSlide {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    @keyframes floatImage {
        0% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-8px);
        }

        100% {
            transform: translateY(0px);
        }
    }
</style>


<div class="row align-items-center d-flex justify-content-center">
    <div class="col-12 mb-4">

        <div class="card border-light shadow-sm components-section align-items-center d-flex justify-content-center">

            <div class="card-body">

                <div class="row mb-4">

                    <div class="col-lg-12">
                        <h3 class="h3 text-center">REPORT PROBLEMS</h3>
                    </div>

                    <!-- IMAGE AT TOP -->
                    <div class="col-12 text-center">
                        <img src="{% static 'report_bug.png' %}" class="report-img">
                    </div>

                    <!-- FORM BELOW -->
                    <div class="col-12">

                        <form action="{% url 'report_professor_email' %}" method="POST" class="mt-4">
                            {% csrf_token %}

                            <div class="form-group">
                                <label class="my-1 mr-2">Choose Problem Category</label>

                                <select class="custom-select my-1 mr-sm-2" name="prob_type" required>

                                    <option value="Login/Register/Face Verification">
                                        Login/Register/Face Verification
                                    </option>

                                    <option value="Exam/Create/View/Update/Delete">
                                        Exam/Create/View/Update/Delete
                                    </option>

                                    <option value="Student Monitoring">
                                        Student Monitoring
                                    </option>

                                    <option value="Insert Marks/Publish Results">
                                        Insert Marks/Publish Results
                                    </option>

                                    <option value="Payment">
                                        Payment
                                    </option>

                                    <option value="Others">
                                        Others
                                    </option>

                                </select>
                            </div>

                            <div class="form-group">

                                <label class="h6">Your message</label>

                                <textarea name="rquery" class="form-control"
                                    placeholder="How can we help? Any Problem/Suggestion" rows="4" required>
                                </textarea>

                            </div>

                            <input type="submit" class="btn btn-primary" value="REPORT!">

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}

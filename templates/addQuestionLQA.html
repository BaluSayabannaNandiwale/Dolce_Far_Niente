{% extends 'professor_dashboard.html' %}
{% block body %}
<div class="row align-items-center d-flex  justify-content-center">
    <div class="col-12 mb-4">
        <div class="card border-light shadow-sm components-section align-items-center d-flex  justify-content-center">
            <div class="card-body align-items-center d-flex justify-content-center">     
                <div class="row mb-4">
                    <div class="col-lg-12 col-sm-16">
							<h3 class="h3 text-center">ADD NEW SUBJECTIVE QUESTION</h3>  
                            </div>
                            <div class="card-body">
							    <form action="" method="POST" class="mt-4">
                                    {% csrf_token %}
                                    <div class="form-group">
                                        <label for="exampleInputIcon3">Question ID (QID)</label>
                                        <div class="input-group mb-4">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text">QID</span>
                                            </div>
                                            <input name="qid" class="form-control" placeholder="QID (e.g., 6):" type="text" required>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label for="exampleInputIcon3">Question for Test {{ test_id }}</label>
                                        <div class="input-group mb-4">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text">Question</span>
                                            </div>
                                            <input name="ques" class="form-control" placeholder="QUESTION:" type="text" required>
                                        </div>
                                    </div>
                                <div class="form-group">
                                    <label for="exampleInputIcon3">MARKS</label>
                                    <div class="input-group mb-4">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">Marks</span>
                                        </div>
                                        <input name="mko" type="number" class="form-control" placeholder="MARKS:" required/>
                                    </div>
                                </div>           
  <input type="submit" class="btn btn-primary" value="ADD QUESTION!">
  <a href="/updatetidlist/" class="btn btn-secondary">CANCEL</a>
    </form>
  </div>
                    </div>
                </div>
            </div>
        </div>
       </div>
{% endblock %}
